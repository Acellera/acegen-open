# Logging configuration
experiment_name: acegen
agent_name: fine_tune_gru
logger_backend: null # csv, wandb, tensorboard, or null
seed: 101
log_frequency: 500

# Dataset configuration
train_dataset_path: null # Path to file containing molecules for fine-tuning
recompute_dataset: True # if False and dataset_log_dir contains a dataset, it will be used
dataset_log_dir: /tmp/fine_tune # if recomputing dataset, save it here

# Model configuration
model: gru # gru, lstm, gpt2, mamba or llama2
custom_model_factory: null # Path to a custom model factory (e.g. my_module.create_model)
model_log_dir: test # save model here

# Training configuration
lr: 0.001 # lower than pretrain default (0.001) to avoid catastrophic forgetting
lr_scheduler: StepLR
lr_scheduler_kwargs:
  step_size: 500
  gamma: 0.97 # 1.0 = no decay
epochs: 10
batch_size: 128
randomize_smiles: True
num_test_smiles: 100
